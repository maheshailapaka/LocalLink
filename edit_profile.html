{% extends "base.html" %}
{% block title %}Edit Profile – Local Link{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">

  <div class="mb-4">
    <h3 class="fw-bold mb-0" style="font-family:'Syne',sans-serif;">
      <i class="bi bi-person-gear text-primary me-2"></i>Edit Profile
    </h3>
    <p class="text-muted small">Update your account details and password</p>
  </div>

  <form method="POST" action="{{ url_for('edit_profile') }}">

    <!-- Account Info -->
    <div class="card shadow-sm mb-4">
      <div class="card-header fw-bold bg-primary text-white">
        <i class="bi bi-person me-2"></i>Account Information
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" name="name" class="form-control" value="{{ user.name }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Phone Number</label>
            <input type="tel" name="phone" class="form-control" value="{{ user.phone or '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">City</label>
            <input type="text" name="city" class="form-control" value="{{ user.city or '' }}" placeholder="e.g. Mumbai">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Locality</label>
            <input type="text" name="locality" class="form-control" value="{{ user.locality or '' }}" placeholder="e.g. Andheri West">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control bg-light" value="{{ user.email }}" disabled>
            <small class="text-muted">Email cannot be changed. Contact support if needed.</small>
          </div>
        </div>
      </div>
    </div>

    <!-- Password Change -->
    <div class="card shadow-sm mb-4">
      <div class="card-header fw-bold bg-light">
        <i class="bi bi-lock me-2"></i>Change Password <span class="text-muted fw-normal small">(leave blank to keep current)</span>
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label fw-semibold">Current Password</label>
            <input type="password" name="current_password" class="form-control" placeholder="Required only if changing password">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">New Password</label>
            <input type="password" name="new_password" id="newPw" class="form-control" placeholder="Min 6 characters" minlength="6">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Confirm New Password</label>
            <input type="password" id="confirmPw" class="form-control" placeholder="Repeat new password">
            <small id="pwMatch" class="d-none"></small>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex gap-3">
      <button type="submit" class="btn btn-primary px-5 fw-bold">
        <i class="bi bi-check-circle me-2"></i>Save Changes
      </button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>

  </form>
</div>
</div>

<script>
const newPw    = document.getElementById('newPw');
const confirmPw = document.getElementById('confirmPw');
const pwMatch   = document.getElementById('pwMatch');

function checkMatch() {
  if (!confirmPw.value) { pwMatch.className = 'd-none'; return; }
  if (newPw.value === confirmPw.value) {
    pwMatch.textContent = 'Passwords match';
    pwMatch.className   = 'text-success small';
  } else {
    pwMatch.textContent = 'Passwords do not match';
    pwMatch.className   = 'text-danger small';
  }
}
newPw.addEventListener('input', checkMatch);
confirmPw.addEventListener('input', checkMatch);
</script>
{% endblock %}
