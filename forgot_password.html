{% extends "base.html" %}
{% block title %}Forgot Password – Local Link{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
  <div class="card shadow-sm mt-5">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="mb-3" style="font-size:3rem;"><i class="bi bi-lock-fill text-primary"></i></div>
        <h4 class="fw-bold" style="font-family:'Syne',sans-serif;">Forgot Password?</h4>
        <p class="text-muted small">Enter your registered email and we'll send you a reset link.</p>
      </div>
      <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="mb-4">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
            <input type="email" name="email" class="form-control border-start-0"
                   placeholder="you@example.com" required autofocus>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
          <i class="bi bi-send me-2"></i>Send Reset Link
        </button>
      </form>
      <div class="text-center mt-4">
        <a href="{{ url_for('login') }}" class="text-muted small">
          <i class="bi bi-arrow-left me-1"></i>Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
</div>
{% endblock %}
