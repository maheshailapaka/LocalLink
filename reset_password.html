{% extends "base.html" %}
{% block title %}Reset Password – Local Link{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
  <div class="card shadow-sm mt-5">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="mb-3" style="font-size:3rem;"><i class="bi bi-shield-lock-fill text-success"></i></div>
        <h4 class="fw-bold" style="font-family:'Syne',sans-serif;">Set New Password</h4>
        <p class="text-muted small">Choose a strong password — at least 6 characters.</p>
      </div>
      <form method="POST" action="{{ url_for('reset_password', token=token) }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">New Password</label>
          <input type="password" name="password" id="pw1" class="form-control"
                 placeholder="Min 6 characters" minlength="6" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password</label>
          <input type="password" id="pw2" class="form-control" placeholder="Repeat password" required>
          <small id="msg" class="d-none"></small>
        </div>
        <button type="submit" class="btn btn-success w-100 fw-bold py-2">
          <i class="bi bi-check-circle me-2"></i>Reset Password
        </button>
      </form>
    </div>
  </div>
</div>
</div>
<script>
const pw1 = document.getElementById('pw1');
const pw2  = document.getElementById('pw2');
const msg  = document.getElementById('msg');
pw2.addEventListener('input', () => {
  if (!pw2.value) { msg.className = 'd-none'; return; }
  if (pw1.value === pw2.value) { msg.textContent='Passwords match'; msg.className='text-success small'; }
  else { msg.textContent='Passwords do not match'; msg.className='text-danger small'; }
});
</script>
{% endblock %}
